---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: tvbo-api
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: tvbo-api
  template:
    metadata:
      labels:
        app: tvbo-api
    spec:
      imagePullSecrets:
        - name: github-credentials
      containers:
        - name: tvbo-api
          image: ghcr.io/virtual-twin/tvbo:dev
          imagePullPolicy: Always
          ports: [{containerPort: 8000}]
          env: [{name: MODE, value: api}]
          readinessProbe:
            httpGet: {path: /api/health, port: 8000}
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /api/health, port: 8000}
            initialDelaySeconds: 45
            periodSeconds: 20
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tvbo-odoo
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: tvbo-odoo
  template:
    metadata:
      labels:
        app: tvbo-odoo
    spec:
      imagePullSecrets:
        - name: github-credentials
      containers:
        - name: tvbo-odoo
          image: ghcr.io/leon-k-martin/tvbo-platform:main
          imagePullPolicy: Always
          ports: [{containerPort: 8069}]
          env:
            - {name: HOST, value: tvbo-postgres}
            - {name: USER, value: tvbo_odoo}
            - {name: PASSWORD, value: odoo} # dont worry we can make this a secret later :)
            - {name: TVBO_API_URL, value: http://tvbo-api:8000}
          volumeMounts: [{name: data, mountPath: /var/lib/odoo}]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tvbo-odoo-pvc

---
# Services
apiVersion: v1
kind: Service
metadata:
  name: tvbo-api
  namespace: kube-system
spec:
  selector:
    app: tvbo-api
  ports: [{port: 8000}]

---
apiVersion: v1
kind: Service
metadata:
  name: tvbo-odoo
  namespace: kube-system
spec:
  selector:
    app: tvbo-odoo
  ports: [{port: 8069}]

---
# Ingress — Kong API Gateway routes
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tvbo
  namespace: kube-system
  annotations:
    konghq.com/strip-path: "false"
spec:
  ingressClassName: kong
  rules:
    - host: tvbo.charite.de
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: tvbo-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tvbo-odoo
                port:
                  number: 8069
